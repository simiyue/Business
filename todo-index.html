<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <main class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-button">Add Task</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Pending:</span>
                    <span class="stat-value" id="pendingTasks">0</span>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- To-Do List -->
            <div class="todo-list" id="todoList">
                <!-- Tasks will be added here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <p>✨ No tasks yet. Add one to get started!</p>
            </div>

            <!-- Clear All Section -->
            <div class="action-section">
                <button id="clearCompleted" class="clear-btn">Clear Completed</button>
                <button id="clearAll" class="clear-btn danger">Clear All</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
